  </defs>

  
  <ellipse cx="100" cy="178" rx="58" ry="9" fill="url(#floor)"></ellipse>

  
  <g transform="translate(100 100)">
    
    <g id="ray3d">
      
      <path d="M -10 -50 Q 0 -78 10 -50 L 6 -38 L -6 -38 Z" fill="#5A2E00"></path>
      
      <path d="M -8.5 -49 Q 0 -74 8.5 -49 L 5.5 -39 L -5.5 -39 Z" fill="url(#rayBody)"></path>
      
      <path d="M -8.5 -49 Q -4 -68 0 -74 L 0 -42 L -5.5 -39 Z" fill="url(#rayHilite)" opacity="0.85"></path>
      
      <path d="M 8.5 -49 Q 4 -68 0 -74 L 0 -42 L 5.5 -39 Z" fill="url(#rayShade)" opacity="0.7"></path>
    </g>
    <use href="#ray3d" transform="rotate(30)"></use>
    <use href="#ray3d" transform="rotate(60)"></use>
    <use href="#ray3d" transform="rotate(90)"></use>
    <use href="#ray3d" transform="rotate(120)"></use>
    <use href="#ray3d" transform="rotate(150)"></use>
    <use href="#ray3d" transform="rotate(180)"></use>
    <use href="#ray3d" transform="rotate(210)"></use>
    <use href="#ray3d" transform="rotate(240)"></use>
    <use href="#ray3d" transform="rotate(270)"></use>
    <use href="#ray3d" transform="rotate(300)"></use>
    <use href="#ray3d" transform="rotate(330)"></use>
  </g>

  
  
  <circle cx="100" cy="100" r="42" fill="#5A2E00"></circle>
  
  <circle cx="100" cy="100" r="40" fill="url(#sphereCore)"></circle>
  
  <circle cx="100" cy="100" r="40" fill="url(#sphereShade)"></circle>
  
  <circle cx="100" cy="100" r="40" fill="url(#sphereSpec)"></circle>

  
  <circle cx="100" cy="100" r="78" fill="none" stroke="#FFB927" stroke-width="2" stroke-opacity="0.10"></circle>
  <circle cx="100" cy="100" r="64" fill="none" stroke="#FFB927" stroke-width="2" stroke-opacity="0.16"></circle>
