<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    
    <radialGradient id="sphereCore" cx="38%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#FFF8E0"></stop>
      <stop offset="18%" stop-color="#FFE066"></stop>
      <stop offset="48%" stop-color="#FFB927"></stop>
      <stop offset="78%" stop-color="#D17C04"></stop>
      <stop offset="100%" stop-color="#7A4500"></stop>
    </radialGradient>

    
    <radialGradient id="sphereShade" cx="65%" cy="72%" r="55%">
      <stop offset="0%" stop-color="#7A4500" stop-opacity="0.55"></stop>
      <stop offset="100%" stop-color="#7A4500" stop-opacity="0"></stop>
    </radialGradient>

    
    <radialGradient id="sphereSpec" cx="36%" cy="28%" r="22%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"></stop>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.18"></stop>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"></stop>
    </radialGradient>

    
    <linearGradient id="rayBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE066"></stop>
      <stop offset="55%" stop-color="#FFB927"></stop>
      <stop offset="100%" stop-color="#A85F02"></stop>
    </linearGradient>
    <linearGradient id="rayHilite" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"></stop>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0.25"></stop>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"></stop>
    </linearGradient>
    <linearGradient id="rayShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7A4500" stop-opacity="0"></stop>
      <stop offset="55%" stop-color="#7A4500" stop-opacity="0.30"></stop>
      <stop offset="100%" stop-color="#7A4500" stop-opacity="0.85"></stop>
    </linearGradient>

    
    <radialGradient id="floor" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1F3319" stop-opacity="0.45"></stop>
      <stop offset="100%" stop-color="#1F3319" stop-opacity="0"></stop>
    </radialGradient>

    
    <radialGradient id="ring" cx="50%" cy="50%" r="50%">
      <stop offset="84%" stop-color="#3E6233" stop-opacity="0"></stop>
      <stop offset="92%" stop-color="#3E6233" stop-opacity="0.10"></stop>
      <stop offset="100%" stop-color="#3E6233" stop-opacity="0"></stop>
